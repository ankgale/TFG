repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend)
        language: python
        entry: bash
        args:
          - -c
          - export PYTHONPATH=backend && mypy --config-file backend/mypy.ini backend
        pass_filenames: false
        files: ^backend/
        additional_dependencies:
          - mypy==1.20.1
          - Django==5.2.10
          - django-stubs==6.0.3
          - django-stubs-ext==6.0.3
          - python-dotenv==1.2.1
          - djangorestframework==3.16.1
          - django-cors-headers==4.9.0
          - channels==4.3.2
          - daphne==4.2.1

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [--ini, backend/.bandit, -r, backend, -ll]
        pass_filenames: false

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        language: system
        entry: bash
        args: [-c, "cd frontend && npm run -s lint"]
        pass_filenames: false
        files: ^frontend/